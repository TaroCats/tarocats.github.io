<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaroCats Cydia Repository</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a; color: #e0e0e0; 
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .container { max-width: 600px; padding: 40px 24px; text-align: center; }
        .icon { width: 64px; height: 64px; border-radius: 16px; background: #2D8CFF; 
                margin: 0 auto 24px; display: flex; align-items: center; justify-content: center;
                font-size: 28px; color: #fff; }
        h1 { font-size: 24px; margin-bottom: 8px; color: #fff; }
        .badge { display: inline-block; background: #2D8CFF22; color: #2D8CFF; 
                 padding: 4px 12px; border-radius: 12px; font-size: 13px; margin-bottom: 24px; }
        .info { background: #1a1a1a; border-radius: 12px; padding: 20px; text-align: left; margin: 24px 0; }
        .info code { 
            display: block; background: #0d0d0d; padding: 12px 16px; border-radius: 8px;
            color: #4ec9b0; font-size: 14px; word-break: break-all; margin: 8px 0;
            user-select: all; -webkit-user-select: all;
        }
        .info label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .pkg { display: flex; align-items: center; gap: 12px; padding: 12px; 
               background: #1a1a1a; border-radius: 10px; margin: 8px 0; text-align: left; }
        .pkg-icon { width: 40px; height: 40px; border-radius: 10px; background: #2D8CFF33; 
                    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
                    font-size: 16px; }
        .pkg-info { flex: 1; }
        .pkg-name { font-weight: 600; color: #fff; font-size: 14px; }
        .pkg-desc { font-size: 12px; color: #888; margin-top: 2px; }
        .pkg-ver { font-size: 12px; color: #2D8CFF; }
        footer { margin-top: 32px; font-size: 12px; color: #555; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📦</div>
        <h1>TaroCats Repo</h1>
        <span class="badge">Cydia / Sileo / Zebra</span>
        
        <div class="info">
            <label>源地址（添加到包管理器）</label>
            <code>https://tarocats.github.io/</code>
        </div>
        
        <div class="pkg">
            <div class="pkg-icon">💬</div>
            <div class="pkg-info">
                <div class="pkg-name">SMSForward</div>
                <div class="pkg-desc">自动读取短信并转发到指定邮箱</div>
            </div>
            <div class="pkg-ver">v1.0.0</div>
        </div>

        <footer>
            rootless · iOS 15-16.6.1 · arm64/arm64e
        </footer>
    </div>
</body>
</html>
